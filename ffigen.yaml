# Run with `dart run ffigen --config ffigen.yaml`.
name: NgspiceDartBindings
description: |
  Bindings for ngspice shared library.

  Regenerate bindings with `dart run ffigen --config ffigen.yaml`.
output: 'lib/ngspice_dart_bindings_generated.dart'
headers:
  entry-points:
    - 'src/ngspice/src/include/ngspice/sharedspice.h'
  include-directives:
    - 'src/ngspice/src/include/ngspice/sharedspice.h'
compiler-opts: '-include stdbool.h'
comments:
  style: any
  length: full
